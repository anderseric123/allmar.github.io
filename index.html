<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>市场结构云图</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(17, 26, 46, 0.92);
      --panel-soft: rgba(255, 255, 255, 0.03);
      --line: rgba(255, 255, 255, 0.08);
      --text: #ecf2ff;
      --muted: #8ea0c6;
      --red: #ff5b77;
      --red-deep: #db365c;
      --green: #16c784;
      --green-deep: #0e8c5d;
      --neutral: #55617d;
      --cyan: #42c6ff;
      --amber: #f5b84c;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.28);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(66, 198, 255, 0.16), transparent 24%),
        radial-gradient(circle at 85% 0%, rgba(255, 91, 119, 0.08), transparent 18%),
        var(--bg);
    }

    button,
    input {
      font: inherit;
    }

    .wrap {
      width: min(1600px, calc(100% - 28px));
      margin: 20px auto 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .title h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 820px;
    }

    .chip-group {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chip-label {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px;
    }

    .chip {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .chip:hover {
      border-color: rgba(66, 198, 255, 0.35);
      color: #dff6ff;
    }

    .chip.active {
      background: linear-gradient(180deg, rgba(66, 198, 255, 0.22), rgba(66, 198, 255, 0.08));
      border-color: rgba(66, 198, 255, 0.34);
      color: #dff6ff;
    }

    .filters-row,
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 260px;
    }

    .search-wrap input {
      width: min(420px, 100%);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
    }

    .search-wrap input:focus {
      border-color: rgba(66, 198, 255, 0.42);
      box-shadow: 0 0 0 2px rgba(66, 198, 255, 0.14);
    }

    .inline-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .inline-switch input {
      accent-color: var(--cyan);
    }

    .clear-btn {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .meta-row {
      padding: 12px;
    }

    .scope-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex: 1;
    }

    .status-text {
      color: var(--muted);
      font-size: 12px;
    }

    .grid-top {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr 1.1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .metric,
    .headline {
      padding: 18px;
      min-height: 118px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
    }

    .metric-sub,
    .headline .text {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.55;
      color: #c4d7ff;
    }

    .headline .text {
      font-size: 16px;
      color: #eef5ff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
    }

    .badge.strong {
      color: #d8fff0;
      background: rgba(22, 199, 132, 0.12);
      border-color: rgba(22, 199, 132, 0.2);
    }

    .badge.warn {
      color: #fff2cf;
      background: rgba(245, 184, 76, 0.12);
      border-color: rgba(245, 184, 76, 0.2);
    }

    .badge.hot {
      color: #ffe0e8;
      background: rgba(255, 91, 119, 0.12);
      border-color: rgba(255, 91, 119, 0.2);
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 16px;
      align-items: start;
    }

    .heatmap-wrap {
      padding: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 20px;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .scale {
      width: 220px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(90deg, #0f8f60 0%, #194d46 38%, #2b3149 50%, #6b2641 62%, #ff5b77 100%);
    }

    .sectors-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
    }

    .sectors-grid.single-sector {
      grid-template-columns: 1fr;
    }

    .sector-card {
      grid-column: span 4;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 10px;
    }

    .sector-card.large {
      grid-column: span 6;
    }

    .sector-card.small {
      grid-column: span 3;
    }

    .sectors-grid.single-sector .sector-card,
    .sectors-grid.single-sector .sector-card.large,
    .sectors-grid.single-sector .sector-card.small {
      grid-column: span 1;
    }

    .sector-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: 600;
    }

    .sector-title span:last-child {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }

    .sector-tiles {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .sectors-grid.single-sector .sector-tiles {
      position: relative;
      display: block;
      min-height: 380px;
    }

    .tile {
      position: relative;
      width: 100%;
      min-height: 108px;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: left;
      color: inherit;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .sectors-grid.single-sector .tile {
      position: absolute;
      min-height: 0;
      width: auto;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 14px;
    }

    .tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .tile.selected {
      outline: 2px solid rgba(255, 255, 255, 0.92);
      outline-offset: -2px;
    }

    .tile.red {
      background: linear-gradient(180deg, rgba(255, 91, 119, 0.95), rgba(219, 54, 92, 0.88));
    }

    .tile.red.soft {
      background: linear-gradient(180deg, rgba(255, 143, 160, 0.86), rgba(210, 81, 109, 0.82));
    }

    .tile.green {
      background: linear-gradient(180deg, rgba(22, 199, 132, 0.86), rgba(14, 140, 93, 0.9));
    }

    .tile.green.soft {
      background: linear-gradient(180deg, rgba(108, 208, 170, 0.84), rgba(52, 147, 114, 0.82));
    }

    .tile.neutral {
      background: linear-gradient(180deg, rgba(86, 97, 125, 0.92), rgba(63, 74, 101, 0.88));
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: auto -28% -38% auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 62%);
      pointer-events: none;
    }

    .tile .name {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .tile.large .name {
      font-size: 15px;
    }

    .sectors-grid.single-sector .tile .name {
      font-size: 16px;
    }

    .tile .price {
      margin-top: 6px;
      font-size: clamp(15px, 1.3vw, 20px);
      font-weight: 800;
      line-height: 1.12;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile .change {
      margin-top: 4px;
      font-size: clamp(13px, 1vw, 16px);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile .meta {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.92;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile.compact .meta {
      display: none;
    }

    .sectors-grid.single-sector .tile .meta {
      text-align: center;
    }

    .tile.micro {
      padding: 8px;
    }

    .tile.micro .tag,
    .tile.micro .meta {
      display: none;
    }

    .tile.micro .name {
      font-size: 12px;
    }

    .tile.micro .price {
      margin-top: 4px;
      font-size: 13px;
    }

    .tile.micro .change {
      margin-top: 2px;
      font-size: 11px;
    }

    .tag {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 10px;
      background: rgba(11, 18, 32, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .empty {
      border-radius: 12px;
      padding: 16px;
      min-height: 90px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.03);
    }

    .right-panel {
      position: sticky;
      top: 16px;
      align-self: start;
    }

    .detail {
      padding: 16px;
    }

    .detail h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .detail-price .big {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
    }

    .detail-price .small {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .state-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stat .k {
      color: var(--muted);
      font-size: 12px;
    }

    .stat .v {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 700;
    }

    .spark {
      height: 96px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      padding: 12px;
      margin-bottom: 14px;
    }

    .spark .label {
      color: var(--muted);
      font-size: 12px;
    }

    .spark svg {
      width: 100%;
      height: 52px;
      margin-top: 8px;
    }

    .explain {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      font-size: 13px;
      line-height: 1.7;
      color: #d7e3ff;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: rgba(66, 198, 255, 0.42);
      background: rgba(66, 198, 255, 0.16);
      color: #e8f8ff;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .secondary-panels {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      align-items: start;
    }

    .side-card {
      padding: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }

    .tab.active {
      color: var(--text);
      background: rgba(66, 198, 255, 0.14);
      border-color: rgba(66, 198, 255, 0.24);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .row.active {
      border-color: rgba(66, 198, 255, 0.44);
      background: rgba(66, 198, 255, 0.12);
    }

    .rank {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 700;
      color: #dfe9ff;
    }

    .name-wrap {
      min-width: 0;
    }

    .main-name {
      font-size: 14px;
      font-weight: 600;
    }

    .desc {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .num {
      font-size: 13px;
      font-weight: 700;
    }

    .up {
      color: #ff95aa;
    }

    .down {
      color: #79e4b6;
    }

    .foot {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 1360px) {
      .grid-top {
        grid-template-columns: repeat(2, 1fr);
      }

      .main {
        grid-template-columns: 1fr;
      }

      .right-panel {
        position: static;
      }

      .secondary-panels {
        grid-template-columns: 1fr;
      }

      .sector-card,
      .sector-card.large,
      .sector-card.small {
        grid-column: span 6;
      }
    }

    @media (max-width: 920px) {
      .wrap {
        width: calc(100% - 20px);
      }

      .topbar,
      .filters-row,
      .meta-row,
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions,
      .search-wrap,
      .search-wrap input {
        width: 100%;
        max-width: none;
      }

      .grid-top {
        grid-template-columns: 1fr;
      }

      .sectors-grid {
        grid-template-columns: 1fr;
      }

      .sector-card,
      .sector-card.large,
      .sector-card.small {
        grid-column: span 1;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .scale {
        width: 160px;
      }

      .sector-tiles,
      .sectors-grid.single-sector .sector-tiles {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        min-height: 0;
      }

      .tile {
        position: relative !important;
        left: auto !important;
        top: auto !important;
        width: auto !important;
        height: auto !important;
        min-height: 96px;
        padding: 10px;
      }

      .tile.compact .meta,
      .tile.micro .meta {
        display: block;
      }

      .tile.micro .tag {
        display: inline-flex;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>市场结构云图</h1>
        <p id="page-subtitle">覆盖全品种主连，支持日内、5日、20日维度切换，点击任意品种查看详细结构信息。</p>
      </div>
      <div class="actions">
        <div class="chip-group" id="period-chips">
          <span class="chip-label">维度</span>
          <button class="chip active" data-period="day">日内</button>
          <button class="chip" data-period="d5">5日</button>
          <button class="chip" data-period="d20">20日</button>
        </div>
      </div>
    </div>

    <div class="filters-row">
      <div class="search-wrap">
        <input id="search-input" type="text" placeholder="搜索品种，如 原油 / 豆粕 / 沪金" />
        <label class="inline-switch"><input id="hot-only" type="checkbox" /> 仅看大幅波动</label>
        <button id="clear-filter" class="clear-btn">清空筛选</button>
      </div>
      <div class="status-text" id="result-count">已展示 0 个品种</div>
    </div>

    <div class="meta-row">
      <div class="scope-wrap" id="scope-chips"></div>
      <div class="status-text" id="update-text">数据加载中</div>
    </div>

    <div class="grid-top">
      <div class="card metric" id="metric-temp"></div>
      <div class="card metric" id="metric-leading"></div>
      <div class="card metric" id="metric-lagging"></div>
      <div class="card metric" id="metric-breadth"></div>
      <div class="card headline" id="metric-headline"></div>
    </div>

    <div class="main">
      <div class="card heatmap-wrap">
        <div class="section-head">
          <div>
            <h2>市场全景热力图</h2>
            <p id="section-desc">颜色按当前维度变化显示，点击品种卡片可联动右侧详情与底部榜单。</p>
          </div>
          <div class="legend">
            <span>-6%</span>
            <div class="scale"></div>
            <span>+6%</span>
          </div>
        </div>
        <div class="sectors-grid" id="sectors-grid"></div>
      </div>

      <div class="right-panel">
        <div class="card detail">
          <h3>品种状态卡片</h3>
          <div class="detail-top">
            <div class="detail-price">
              <div class="big" id="detail-big">-</div>
              <div class="small" id="detail-small">-</div>
            </div>
            <div class="badge hot" id="detail-badge">状态标记</div>
          </div>

          <div class="stats" id="detail-stats"></div>

          <div class="explain" id="detail-explain"></div>

          <div class="spark">
            <div class="label" id="spark-label">近8个交易日走势</div>
            <svg viewBox="0 0 240 60" preserveAspectRatio="none" id="spark-svg" aria-hidden="true"></svg>
          </div>

          <div class="state-tags" id="detail-tags"></div>

          <div class="detail-actions">
            <button class="btn primary" id="watch-btn">加入自选</button>
            <button class="btn" id="focus-sector-btn">筛选同板块</button>
          </div>
        </div>
      </div>
    </div>

    <div class="secondary-panels">
      <div class="card side-card">
        <div class="tabs" id="rank-tabs">
          <button class="tab active" data-rank="gainers">涨幅榜</button>
          <button class="tab" data-rank="losers">跌幅榜</button>
          <button class="tab" data-rank="volatility">振幅榜</button>
        </div>
        <div class="list" id="rank-list"></div>
      </div>

      <div class="card side-card">
        <div class="tabs" id="op-tabs">
          <button class="tab active">结构观察</button>
        </div>
        <div class="list" id="op-list"></div>
      </div>

      <div class="card side-card">
        <div class="tabs">
          <button class="tab active">自选观察</button>
        </div>
        <div class="list" id="watch-list"></div>
        <div class="foot">说明：页面仅展示市场结构与价格统计结果，不构成任何投资建议或交易指引。</div>
      </div>
    </div>
  </div>

  <script src="./market_structure_cloud_data.js"></script>
  <script>
    const PRODUCTS = Array.isArray(window.MARKET_PRODUCTS) ? window.MARKET_PRODUCTS : [];
    const state = {
      period: "day",
      scope: "all",
      search: "",
      hotOnly: false,
      selectedId: PRODUCTS[0] ? PRODUCTS[0].id : "",
      rankMode: "gainers",
      watchlist: new Set()
    };

    const periodText = { day: "日内", d5: "5日", d20: "20日" };
    const sectorOrder = ["化工", "原油链", "黑色金属", "股指期货", "国债期货", "农副产品", "油脂油料", "软商品", "航运", "轻化工", "煤炭", "贵金属", "有色金属"];

    function metricValue(item) {
      if (state.period === "d5") return item.d5Change ?? 0;
      if (state.period === "d20") return item.d20Change ?? 0;
      return item.dayChange ?? 0;
    }

    function formatPct(value) {
      const num = Number(value || 0);
      const sign = num > 0 ? "+" : "";
      return `${sign}${num.toFixed(2)}%`;
    }

    function formatPrice(value) {
      const num = Number(value || 0);
      if (Math.abs(num) >= 1000) {
        return String(Number(num.toFixed(2)).toLocaleString("en-US"));
      }
      return String(Number(num.toFixed(2)));
    }

    function formatSignedPrice(value) {
      const num = Number(value || 0);
      if (num === 0) return "0";
      return `${num > 0 ? "+" : "-"}${formatPrice(Math.abs(num))}`;
    }

    function formatAmount(value) {
      return `${Number(value || 0).toFixed(2)}亿`;
    }

    function displayQuoteCode(code) {
      return String(code || "").toUpperCase().replace(/M$/, "");
    }

    function describeTrend(trend) {
      if (!Array.isArray(trend) || trend.length < 4) return "近8个交易日走势较平稳";
      const values = trend.map((value) => Number(value || 0));
      const first = values[0];
      const last = values[values.length - 1];
      const mid = values[Math.floor(values.length / 2)];
      const netMove = ((last - first) / (Math.abs(first) || 1)) * 100;
      const recentMove = ((last - values[values.length - 3]) / (Math.abs(values[values.length - 3]) || 1)) * 100;
      const maxIndex = values.indexOf(Math.max(...values));
      const minIndex = values.indexOf(Math.min(...values));

      if (netMove >= 6 && recentMove >= 2) return "近8个交易日整体抬升，末端仍在走强";
      if (netMove >= 4 && maxIndex === values.length - 1) return "近8个交易日持续修复，价格重心逐步上移";
      if (netMove <= -6 && recentMove <= -2) return "近8个交易日整体回落，末端仍偏弱";
      if (netMove <= -4 && minIndex === values.length - 1) return "近8个交易日重心下移，尾段继续承压";
      if (maxIndex < values.length - 2 && last < mid) return "近8个交易日先冲高后回落，短线有所降温";
      if (minIndex < values.length - 2 && last > mid) return "近8个交易日先回落后修复，近期有所回升";
      return "近8个交易日以区间震荡为主，价格重心变化有限";
    }

    function hotTag(item) {
      const metric = Math.abs(metricValue(item));
      if (metric >= 8) return "强波动";
      if (metric >= 4) return "显著异动";
      if (metric >= 2) return "偏强变化";
      return "常态波动";
    }

    function tileTone(item) {
      const value = metricValue(item);
      if (value >= 6) return "red";
      if (value >= 1) return "red soft";
      if (value <= -4) return "green";
      if (value <= -0.5) return "green soft";
      return "neutral";
    }

    function sectorStats(items) {
      if (!items.length) return { avg: 0, up: 0, down: 0 };
      const avg = items.reduce((sum, item) => sum + metricValue(item), 0) / items.length;
      const up = items.filter((item) => metricValue(item) > 0).length;
      return { avg, up, down: items.length - up };
    }

    function filteredProducts() {
      return PRODUCTS.filter((item) => {
        if (state.scope !== "all" && item.sector !== state.scope) return false;
        if (state.search && !item.name.includes(state.search)) return false;
        if (state.hotOnly && Math.abs(metricValue(item)) < 3) return false;
        return true;
      });
    }

    function renderScopeChips() {
      const sectors = sectorOrder.filter((sector) => PRODUCTS.some((item) => item.sector === sector));
      const html = [
        '<span class="chip-label">范围</span>',
        `<button class="chip ${state.scope === "all" ? "active" : ""}" data-scope="all">全市场</button>`
      ].concat(sectors.map((sector) => `<button class="chip ${state.scope === sector ? "active" : ""}" data-scope="${sector}">${sector}</button>`)).join("");
      document.getElementById("scope-chips").innerHTML = html;
      document.querySelectorAll("[data-scope]").forEach((button) => {
        button.addEventListener("click", () => {
          state.scope = button.dataset.scope;
          render();
        });
      });
    }

    function renderTopMetrics(items) {
      if (!items.length) {
        document.getElementById("metric-temp").innerHTML = '<div class="label-row"><span>市场温度</span><span class="badge warn">暂无数据</span></div><div class="metric-value">--</div><div class="metric-sub">当前筛选条件下没有匹配品种。</div>';
        document.getElementById("metric-leading").innerHTML = '<div class="label-row"><span>最强板块</span><span class="badge warn">暂无数据</span></div><div class="metric-value">--</div><div class="metric-sub">请放宽筛选后再查看。</div>';
        document.getElementById("metric-lagging").innerHTML = '<div class="label-row"><span>最弱板块</span><span class="badge warn">暂无数据</span></div><div class="metric-value">--</div><div class="metric-sub">当前范围内无法形成对比。</div>';
        document.getElementById("metric-breadth").innerHTML = '<div class="label-row"><span>上涨广度</span><span class="badge warn">暂无数据</span></div><div class="metric-value">--</div><div class="metric-sub">请调整筛选条件。</div>';
        document.getElementById("metric-headline").innerHTML = '<div class="label-row"><span>结构摘要</span></div><div class="text">当前筛选条件下暂无可展示的市场结构信息。</div>';
        return;
      }

      const upCount = items.filter((item) => metricValue(item) > 0).length;
      const downCount = items.filter((item) => metricValue(item) < 0).length;
      const avgAbs = items.reduce((sum, item) => sum + Math.abs(metricValue(item)), 0) / items.length;
      const marketTemp = Math.round(Math.min(100, avgAbs * 10 + (upCount / items.length) * 35));
      const sectorCards = sectorOrder
        .map((sector) => ({ sector, items: items.filter((item) => item.sector === sector) }))
        .filter((entry) => entry.items.length)
        .map((entry) => ({ sector: entry.sector, ...sectorStats(entry.items) }));
      const leading = sectorCards.slice().sort((a, b) => b.avg - a.avg)[0];
      const lagging = sectorCards.slice().sort((a, b) => a.avg - b.avg)[0];
      const strongestItems = items.slice().sort((a, b) => Math.abs(metricValue(b)) - Math.abs(metricValue(a))).slice(0, 3).map((item) => item.name).join("、");

      document.getElementById("metric-temp").innerHTML = `
        <div class="label-row"><span>市场温度</span><span class="badge ${marketTemp >= 65 ? "strong" : marketTemp >= 45 ? "warn" : "hot"}">${marketTemp >= 65 ? "活跃" : marketTemp >= 45 ? "中性" : "偏弱"}</span></div>
        <div class="metric-value">${marketTemp} / 100</div>
        <div class="metric-sub">${periodText[state.period]}上涨 ${upCount} 个，下跌 ${downCount} 个，波动中枢 ${avgAbs.toFixed(2)}%。</div>
      `;
      document.getElementById("metric-leading").innerHTML = `
        <div class="label-row"><span>最强板块</span><span class="badge hot">相对领先</span></div>
        <div class="metric-value">${leading ? leading.sector : "--"}</div>
        <div class="metric-sub">板块均值 ${leading ? formatPct(leading.avg) : "--"}，上涨占比 ${leading ? `${leading.up}/${leading.up + leading.down}` : "--"}。</div>
      `;
      document.getElementById("metric-lagging").innerHTML = `
        <div class="label-row"><span>最弱板块</span><span class="badge warn">相对承压</span></div>
        <div class="metric-value">${lagging ? lagging.sector : "--"}</div>
        <div class="metric-sub">板块均值 ${lagging ? formatPct(lagging.avg) : "--"}，下跌占比 ${lagging ? `${lagging.down}/${lagging.up + lagging.down}` : "--"}。</div>
      `;
      document.getElementById("metric-breadth").innerHTML = `
        <div class="label-row"><span>大幅波动</span><span class="badge strong">|${periodText[state.period]}| ≥ 3%</span></div>
        <div class="metric-value">${items.filter((item) => Math.abs(metricValue(item)) >= 3).length} 个</div>
        <div class="metric-sub">筛选后共 ${items.length} 个品种，适合先看异动再下钻。</div>
      `;
      document.getElementById("metric-headline").innerHTML = `
        <div class="label-row"><span>结构摘要</span></div>
        <div class="text">${periodText[state.period]}变化最突出的品种集中在 ${strongestItems || "暂无"}。当前页面先看板块，再看单品，再进入自选观察。</div>
      `;
    }

    function sectorSpanClass(count) {
      if (count >= 9) return "large";
      if (count <= 3) return "small";
      return "";
    }

    function treemapWeight(item) {
      return Math.max(1, Math.abs(metricValue(item)) * 3 + (item.swing || 0) * 0.4 + 1);
    }

    function splitByWeight(items) {
      const total = items.reduce((sum, item) => sum + treemapWeight(item), 0);
      let acc = 0;
      let index = 0;
      for (let i = 0; i < items.length; i += 1) {
        acc += treemapWeight(items[i]);
        if (acc >= total / 2) {
          index = i + 1;
          break;
        }
      }
      if (!index || index >= items.length) index = Math.ceil(items.length / 2);
      return [items.slice(0, index), items.slice(index)];
    }

    function buildTreemapLayout(items, x = 0, y = 0, w = 100, h = 100) {
      if (!items.length) return [];
      if (items.length === 1) return [{ item: items[0], x, y, w, h }];
      const [first, second] = splitByWeight(items);
      const firstWeight = first.reduce((sum, item) => sum + treemapWeight(item), 0);
      const totalWeight = items.reduce((sum, item) => sum + treemapWeight(item), 0) || 1;
      const ratio = firstWeight / totalWeight;
      if (w >= h) {
        const firstWidth = w * ratio;
        return [
          ...buildTreemapLayout(first, x, y, firstWidth, h),
          ...buildTreemapLayout(second, x + firstWidth, y, w - firstWidth, h)
        ];
      }
      const firstHeight = h * ratio;
      return [
        ...buildTreemapLayout(first, x, y, w, firstHeight),
        ...buildTreemapLayout(second, x, y + firstHeight, w, h - firstHeight)
      ];
    }

    function sectorMapHeight(list, singleSector) {
      const maxMove = Math.max(...list.map((item) => Math.abs(metricValue(item))), 0);
      const base = singleSector ? 360 : 210;
      const countBoost = Math.min(singleSector ? 220 : 120, list.length * (singleSector ? 24 : 14));
      const moveBoost = Math.min(singleSector ? 120 : 60, maxMove * (singleSector ? 8 : 4));
      return Math.round(base + countBoost + moveBoost);
    }

    function tileDensityClass(rect) {
      if (rect.w < 14 || rect.h < 18) return "micro";
      if (rect.w < 22 || rect.h < 24) return "compact";
      if (rect.w > 34 || rect.h > 34) return "large";
      return "";
    }

    function buildTile(item, rect = null, singleSector = false) {
      const selected = item.id === state.selectedId ? "selected" : "";
      const densityClass = rect ? tileDensityClass(rect) : "";
      const style = rect
        ? `left: calc(${rect.x.toFixed(2)}% + 2px); top: calc(${rect.y.toFixed(2)}% + 2px); width: calc(${rect.w.toFixed(2)}% - 4px); height: calc(${rect.h.toFixed(2)}% - 4px);`
        : "";
      return `
        <button class="tile ${tileTone(item)} ${densityClass} ${singleSector ? "single-view" : ""} ${selected}" data-id="${item.id}"${style ? ` style="${style}"` : ""}>
          <div class="tag">${hotTag(item)}</div>
          <div class="name">${item.name}</div>
          <div class="price">${formatPrice(item.price)}</div>
          <div class="change">${formatPct(metricValue(item))}</div>
          <div class="meta">振幅 ${item.swing.toFixed(2)}% ｜ ${formatAmount(item.amount)}</div>
        </button>
      `;
    }

    function renderSectors(items) {
      const visibleSectors = sectorOrder.filter((sector) => items.some((item) => item.sector === sector));
      const grid = document.getElementById("sectors-grid");
      const singleSector = visibleSectors.length === 1;
      grid.classList.toggle("single-sector", singleSector);
      const html = sectorOrder
        .map((sector) => {
          const list = items
            .filter((item) => item.sector === sector)
            .sort((a, b) => Math.abs(metricValue(b)) - Math.abs(metricValue(a)));
          if (!list.length) return "";
          const stats = sectorStats(list);
          const mapHeight = singleSector ? sectorMapHeight(list, true) : 0;
          const layout = singleSector ? buildTreemapLayout(list) : [];
          return `
            <section class="sector-card ${sectorSpanClass(list.length)}">
              <div class="sector-title">
                <span>${sector}</span>
                <span>均值 ${formatPct(stats.avg)} ｜ ${list.length} 个</span>
              </div>
              <div class="sector-tiles"${singleSector ? ` style="height:${mapHeight}px"` : ""}>
                ${singleSector
                  ? layout.map(({ item, x, y, w, h }) => buildTile(item, { x, y, w, h }, true)).join("")
                  : list.map((item) => buildTile(item)).join("")}
              </div>
            </section>
          `;
        })
        .join("");
      grid.innerHTML = html || '<div class="empty">当前筛选下暂无匹配品种。</div>';
      document.querySelectorAll(".tile[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          render();
        });
      });
    }

    function ensureSelected(items) {
      if (!items.length) {
        state.selectedId = "";
        return;
      }
      if (!items.some((item) => item.id === state.selectedId)) {
        state.selectedId = items[0].id;
      }
    }

    function buildSpark(trend) {
      if (!trend || !trend.length) return "";
      const min = Math.min(...trend);
      const max = Math.max(...trend);
      const span = max - min || 1;
      const points = trend.map((value, index) => {
        const x = Math.round((index / (trend.length - 1)) * 236 + 2);
        const y = Math.round(54 - ((value - min) / span) * 42);
        return `${x},${y}`;
      });
      return `
        <polyline fill="none" stroke="rgba(66,198,255,.95)" stroke-width="3" points="${points.join(" ")}"></polyline>
        <polyline fill="rgba(66,198,255,.14)" stroke="none" points="2,60 ${points.join(" ")} 238,60"></polyline>
      `;
    }

    function renderDetail(items) {
      const selected = items.find((item) => item.id === state.selectedId);
      const watchBtn = document.getElementById("watch-btn");
      const sectorBtn = document.getElementById("focus-sector-btn");
      if (!selected) {
        document.getElementById("detail-big").textContent = "暂无匹配品种";
        document.getElementById("detail-small").textContent = "请调整筛选条件后再查看";
        document.getElementById("detail-badge").textContent = "状态标记";
        document.getElementById("detail-stats").innerHTML = '<div class="stat"><div class="k">当前状态</div><div class="v">--</div></div><div class="stat"><div class="k">最新价</div><div class="v">--</div></div><div class="stat"><div class="k">振幅</div><div class="v">--</div></div><div class="stat"><div class="k">成交额</div><div class="v">--</div></div>';
        document.getElementById("detail-explain").textContent = "当前筛选条件下暂无可展示的品种状态信息。";
        document.getElementById("spark-svg").innerHTML = "";
        document.getElementById("detail-tags").innerHTML = "";
        watchBtn.disabled = true;
        sectorBtn.disabled = true;
        return;
      }

      const sectorItems = PRODUCTS.filter((item) => item.sector === selected.sector).sort((a, b) => metricValue(b) - metricValue(a));
      const sectorRank = sectorItems.findIndex((item) => item.id === selected.id) + 1;
      const marketRank = PRODUCTS.slice().sort((a, b) => Math.abs(metricValue(b)) - Math.abs(metricValue(a))).findIndex((item) => item.id === selected.id) + 1;
      const tags = [
        `${periodText[state.period]} ${formatPct(metricValue(selected))}`,
        `振幅 ${selected.swing.toFixed(2)}%`,
        `${selected.sector} 第 ${sectorRank} 位`,
        `全市场变化第 ${marketRank} 位`
      ];

      document.getElementById("detail-big").textContent = `${selected.name} ${formatPrice(selected.price)}`;
      document.getElementById("detail-small").textContent = `${selected.sector} ｜ 主连 ${displayQuoteCode(selected.quoteCode)} ｜ 数据日期 ${selected.date}`;
      document.getElementById("detail-badge").textContent = hotTag(selected);
      document.getElementById("detail-stats").innerHTML = `
        <div class="stat"><div class="k">${periodText[state.period]}涨跌幅</div><div class="v">${formatPct(metricValue(selected))}</div></div>
        <div class="stat"><div class="k">日内涨跌额</div><div class="v">${formatSignedPrice(selected.changeAmount)}</div></div>
        <div class="stat"><div class="k">振幅</div><div class="v">${selected.swing.toFixed(2)}%</div></div>
        <div class="stat"><div class="k">成交额</div><div class="v">${formatAmount(selected.amount)}</div></div>
      `;
      document.getElementById("spark-label").textContent = `${selected.name} 近8个交易日走势`;
      document.getElementById("spark-svg").innerHTML = buildSpark(selected.trend);
      const periodSummary = state.period === "day"
        ? `日内涨跌额 ${formatSignedPrice(selected.changeAmount)}，涨跌幅 ${formatPct(selected.dayChange)}`
        : `日内涨跌额 ${formatSignedPrice(selected.changeAmount)}，日内涨跌幅 ${formatPct(selected.dayChange)}，${periodText[state.period]}涨跌幅 ${formatPct(metricValue(selected))}`;
      const sectorSummary = sectorRank === 1
        ? `当前位于 ${selected.sector} 板块前列`
        : `当前位于 ${selected.sector} 板块第 ${sectorRank} 位`;
      const trendSummary = describeTrend(selected.trend);
      document.getElementById("detail-explain").textContent = `${selected.name} 最新价 ${formatPrice(selected.price)}。${trendSummary}。${sectorSummary}，全市场变化排名第 ${marketRank} 位。${periodSummary}，振幅 ${selected.swing.toFixed(2)}%，成交额 ${formatAmount(selected.amount)}。`;
      document.getElementById("detail-tags").innerHTML = tags.map((tag, index) => `<div class="badge ${index < 2 ? "strong" : "warn"}">${tag}</div>`).join("");

      watchBtn.disabled = false;
      sectorBtn.disabled = false;
      watchBtn.textContent = state.watchlist.has(selected.id) ? "已加入自选" : "加入自选";
      watchBtn.classList.toggle("primary", !state.watchlist.has(selected.id));
    }

    function rankValue(item) {
      if (state.rankMode === "losers") return metricValue(item);
      if (state.rankMode === "volatility") return item.swing ?? 0;
      return metricValue(item);
    }

    function rankItems(items) {
      const list = items.slice();
      if (state.rankMode === "losers") return list.sort((a, b) => metricValue(a) - metricValue(b)).slice(0, 8);
      if (state.rankMode === "volatility") return list.sort((a, b) => (b.swing ?? 0) - (a.swing ?? 0)).slice(0, 8);
      return list.sort((a, b) => metricValue(b) - metricValue(a)).slice(0, 8);
    }

    function renderRankList(items) {
      if (!items.length) {
        document.getElementById("rank-list").innerHTML = '<div class="row" style="grid-template-columns: 1fr; cursor: default;"><div class="name-wrap"><div class="main-name">当前筛选下暂无榜单</div><div class="desc">请调整筛选范围后再查看。</div></div></div>';
        return;
      }
      document.getElementById("rank-list").innerHTML = rankItems(items).map((item, index) => `
        <button class="row ${item.id === state.selectedId ? "active" : ""}" data-id="${item.id}">
          <div class="rank">${index + 1}</div>
          <div class="name-wrap">
            <div class="main-name">${item.name}</div>
            <div class="desc">${item.sector} ｜ 最新价 ${formatPrice(item.price)} ｜ 振幅 ${item.swing.toFixed(2)}%</div>
          </div>
          <div class="num ${state.rankMode === "volatility" ? "up" : (metricValue(item) >= 0 ? "up" : "down")}">${state.rankMode === "volatility" ? `${item.swing.toFixed(2)}%` : formatPct(metricValue(item))}</div>
        </button>
      `).join("");
      document.querySelectorAll("#rank-list .row[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          render();
        });
      });
    }

    function renderOpList(items) {
      const list = sectorOrder
        .map((sector) => {
          const sectorItems = items.filter((item) => item.sector === sector);
          if (!sectorItems.length) return null;
          const avg = sectorItems.reduce((sum, item) => sum + metricValue(item), 0) / sectorItems.length;
          const upCount = sectorItems.filter((item) => metricValue(item) > 0).length;
          const topItem = sectorItems.slice().sort((a, b) => Math.abs(metricValue(b)) - Math.abs(metricValue(a)))[0];
          return {
            id: topItem.id,
            name: sector,
            avg,
            upCount,
            total: sectorItems.length,
            topItem,
            score: Math.abs(avg) + Math.abs(metricValue(topItem)) / 2
          };
        })
        .filter(Boolean)
        .sort((a, b) => b.score - a.score)
        .slice(0, 6);
      document.getElementById("op-list").innerHTML = (list.length ? list : [null]).map((item, index) => {
        if (!item) {
          return '<div class="row" style="grid-template-columns: 1fr; cursor: default;"><div class="name-wrap"><div class="main-name">当前筛选下暂无重点项</div><div class="desc">可以放宽筛选范围或关闭“仅看大幅波动”。</div></div></div>';
        }
        const desc = `${item.name} ｜ 均值 ${formatPct(item.avg)} ｜ 上涨 ${item.upCount}/${item.total} ｜ 代表品种 ${item.topItem.name} ${formatPct(metricValue(item.topItem))}`;
        return `
          <button class="row" data-id="${item.id}" style="grid-template-columns: 1fr;">
            <div class="name-wrap">
              <div class="main-name">${index + 1}. ${item.name}板块</div>
              <div class="desc">${desc}</div>
            </div>
          </button>
        `;
      }).join("");
      document.querySelectorAll("#op-list .row[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          render();
        });
      });
    }

    function renderWatchList() {
      const watchItems = Array.from(state.watchlist).map((id) => PRODUCTS.find((item) => item.id === id)).filter(Boolean);
      document.getElementById("watch-list").innerHTML = (watchItems.length ? watchItems : [null]).map((item, index) => {
        if (!item) {
          return '<div class="row" style="grid-template-columns: 1fr; cursor: default;"><div class="name-wrap"><div class="main-name">暂未加入自选</div><div class="desc">点击右侧“加入自选”后，会在这里形成你的观察列表。</div></div></div>';
        }
        return `
          <button class="row ${item.id === state.selectedId ? "active" : ""}" data-id="${item.id}">
            <div class="rank">${index + 1}</div>
            <div class="name-wrap">
              <div class="main-name">${item.name}</div>
              <div class="desc">${item.sector} ｜ 最新价 ${formatPrice(item.price)} ｜ ${periodText[state.period]} ${formatPct(metricValue(item))}</div>
            </div>
            <div class="num ${metricValue(item) >= 0 ? "up" : "down"}">${formatPct(metricValue(item))}</div>
          </button>
        `;
      }).join("");
      document.querySelectorAll("#watch-list .row[data-id]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          render();
        });
      });
    }

    function renderMeta(items) {
      const dates = PRODUCTS.map((item) => item.date).filter(Boolean).sort();
      const latestDate = dates[dates.length - 1] || "--";
      document.getElementById("result-count").textContent = `已展示 ${items.length} / ${PRODUCTS.length} 个品种`;
      document.getElementById("update-text").textContent = `更新日期 ${latestDate}`;
      document.getElementById("page-subtitle").textContent = `覆盖 ${PRODUCTS.length} 个主连品种，支持日内、5日、20日维度切换，点击任意品种查看详细结构信息。`;
      document.getElementById("section-desc").textContent = `当前按${periodText[state.period]}变化着色，点击品种卡片可联动右侧详情与底部观察区。`;
    }

    function bindStaticEvents() {
      document.querySelectorAll("[data-period]").forEach((button) => {
        button.addEventListener("click", () => {
          state.period = button.dataset.period;
          document.querySelectorAll("[data-period]").forEach((chip) => chip.classList.toggle("active", chip.dataset.period === state.period));
          render();
        });
      });
      document.getElementById("search-input").addEventListener("input", (event) => {
        state.search = event.target.value.trim();
        render();
      });
      document.getElementById("hot-only").addEventListener("change", (event) => {
        state.hotOnly = event.target.checked;
        render();
      });
      document.getElementById("clear-filter").addEventListener("click", () => {
        state.search = "";
        state.hotOnly = false;
        state.scope = "all";
        document.getElementById("search-input").value = "";
        document.getElementById("hot-only").checked = false;
        render();
      });
      document.querySelectorAll("#rank-tabs .tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.rankMode = button.dataset.rank;
          document.querySelectorAll("#rank-tabs .tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.rank === state.rankMode));
          render();
        });
      });
      document.getElementById("watch-btn").addEventListener("click", () => {
        if (!state.selectedId) return;
        if (state.watchlist.has(state.selectedId)) state.watchlist.delete(state.selectedId);
        else state.watchlist.add(state.selectedId);
        render();
      });
      document.getElementById("focus-sector-btn").addEventListener("click", () => {
        const selected = PRODUCTS.find((item) => item.id === state.selectedId);
        if (!selected) return;
        state.scope = selected.sector;
        render();
      });
    }

    function render() {
      const items = filteredProducts();
      ensureSelected(items);
      renderScopeChips();
      renderMeta(items);
      renderTopMetrics(items);
      renderSectors(items);
      renderDetail(items);
      renderRankList(items);
      renderOpList(items);
      renderWatchList();
    }

    bindStaticEvents();
    render();
  </script>
</body>
</html>
